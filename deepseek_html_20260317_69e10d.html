<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>土味黑客WAF · 矩阵拦截</title>
  <style>
    /* ===== 混搭设计系统：Shadcn 简洁 · MD3 圆润 · Liquid Glass 流光 · Fluent 光影 ===== */
    /* 额外注入：黑客帝国代码雨 + glitch故障 + 扫描线 + 土味赛博 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', Courier, monospace; /* 黑客必备等宽 */
      background: #0a0c0b; /* 深色底子让代码雨明显 */
      position: relative;
      overflow: hidden;
      padding: 1rem;
    }

    /* ===== 黑客帝国代码雨 canvas ===== */
    #matrix-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.35; /* 半透明，不抢戏但足够土 */
      mix-blend-mode: screen; /* 跟底层液态玻璃融合 */
    }

    /* 液态玻璃背景 —— 流动的巨型模糊圆 (增强色彩) */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      background: 
        radial-gradient(circle at 20% 30%, rgba(255, 0, 150, 0.9) 0%, transparent 35%),
        radial-gradient(circle at 90% 70%, rgba(0, 255, 200, 0.9) 0%, transparent 40%),
        radial-gradient(circle at 40% 80%, rgba(255, 220, 0, 0.8) 0%, transparent 45%),
        radial-gradient(circle at 70% 20%, rgba(200, 0, 255, 0.8) 0%, transparent 35%);
      filter: blur(55px) saturate(300%);
      animation: liquidShift 14s infinite alternate ease-in-out;
    }

    /* 额外噪点 + 扫描线 (Fluent 细节 + 黑客 CRT) */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0px, rgba(255,255,255,0.02) 2px, transparent 3px, transparent 6px);
      pointer-events: none;
      z-index: 3;
      mix-blend-mode: overlay;
      opacity: 0.5;
    }

    @keyframes liquidShift {
      0% { transform: scale(1) rotate(0deg); opacity: 0.7; }
      50% { transform: scale(1.2) rotate(2deg); opacity: 1; }
      100% { transform: scale(1) rotate(-2deg); opacity: 0.8; }
    }

    /* ===== 主卡片 —— 混搭核心 + 黑客风格边框 ===== */
    .card {
      position: relative;
      z-index: 20;
      max-width: 640px;
      width: 100%;
      padding: 2.8rem 2.2rem;
      background: rgba(10, 20, 20, 0.35); /* 半透明黑色基底 */
      backdrop-filter: blur(16px) saturate(250%);
      -webkit-backdrop-filter: blur(16px) saturate(250%);
      border-radius: 48px 24px 48px 24px;
      /* MD3 大圆角 + Shadcn 干净边界 + Fluent 深度 + 黑客霓虹 */
      box-shadow: 
        0 30px 50px -15px rgba(0, 255, 200, 0.6),
        0 0 0 2px rgba(0, 255, 0, 0.4) inset,
        0 0 20px rgba(0, 255, 0, 0.3),
        0 0 40px #00cc99,
        0 20px 40px -10px black;
      border: 1px solid rgba(0, 255, 0, 0.6);
      transition: all 0.3s ease;
      color: #b3ffcf;
      text-shadow: 0 0 5px #00ff80, 0 0 12px #00cc99;
    }

    /* 悬浮增强液态感 + 黑客闪烁 */
    .card:hover {
      box-shadow: 
        0 30px 70px -10px #00ffff,
        0 0 0 3px #66ff66 inset,
        0 0 40px #00ffaa,
        0 0 80px #ff00aa,
        0 20px 40px -5px black;
      backdrop-filter: blur(20px) saturate(300%);
      transform: translateY(-6px) scale(1.01);
      border-color: #ff66aa;
    }

    /* 土味大字 403 —— 黑客故障风格 (glitch) */
    .glitch-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 0.25rem;
    }
    .card h1 {
      font-size: clamp(6rem, 22vw, 9rem);
      font-weight: 900;
      line-height: 1;
      margin: 0 0 0.25rem 0;
      color: #00ffaa;
      text-shadow: 
        -4px -4px 0 #ff00de,
        4px 4px 0 #00e0ff,
        0 0 20px #00ff80;
      letter-spacing: -2px;
      filter: drop-shadow(0 0 10px #00ffc3);
      animation: glitch 3s infinite step-end;
    }

    /* glitch 故障动画 */
    @keyframes glitch {
      0%, 100% { transform: skew(0deg, 0deg); opacity: 1; text-shadow: -4px -4px 0 #ff00de, 4px 4px 0 #00e0ff, 0 0 20px #00ff80; }
      95% { transform: skew(5deg, -2deg); text-shadow: -6px -2px 0 cyan, 6px 2px 0 magenta; }
      96% { transform: skew(-5deg, 3deg); text-shadow: 8px 3px 0 lime, -8px -3px 0 red; }
      97% { transform: skew(3deg, -1deg); }
    }

    /* 土味警告副标题 (终端风格) */
    .sub-title {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      background: rgba(0, 30, 20, 0.7);
      padding: 0.6rem 1.5rem;
      border-radius: 60px;
      backdrop-filter: blur(8px);
      border: 2px solid #00ff99;
      box-shadow: 0 0 20px #00ffaa, inset 0 0 10px #00cc99;
      width: fit-content;
      color: #ccffcc;
      text-transform: uppercase;
      font-family: 'Courier New', monospace;
    }

    .sub-title span {
      font-size: 2rem;
      filter: drop-shadow(0 0 10px magenta);
    }

    /* 主体信息 —— 黑客控制台风格 */
    .message {
      background: rgba(0, 20, 0, 0.5);
      padding: 1.6rem 2rem;
      border-radius: 32px 16px 32px 16px;
      margin: 2rem 0;
      border-left: 10px solid #00ff80;
      border-right: 3px solid #ff44aa;
      box-shadow: 
        inset 0 0 30px rgba(0, 255, 0, 0.3),
        0 0 30px #00b8ff;
      backdrop-filter: blur(6px);
      font-family: 'Courier New', monospace;
    }

    .message p {
      font-size: 1.3rem;
      line-height: 1.5;
      color: #aaffdd;
      text-shadow: 0 0 8px #00ffc3;
      font-weight: 500;
    }

    .message p strong {
      background: linear-gradient(145deg, #ff44cc, #00ffaa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 900;
      text-transform: uppercase;
      font-size: 1.5rem;
      letter-spacing: 2px;
    }

    /* 按钮区域 —— 赛博按钮 + 黑客风格 */
    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      margin: 2.5rem 0 1rem;
      justify-content: center;
    }

    /* MD3 填充按钮 魔改成黑客攻击钮 */
    .btn-md3 {
      background: rgba(0, 40, 30, 0.8);
      border: 2px solid #00ffc3;
      padding: 1rem 2.5rem;
      border-radius: 60px;
      font-size: 1.3rem;
      font-weight: 800;
      color: #00ffc3;
      box-shadow: 0 0 30px #00ffc3, inset 0 0 20px #00cc99;
      cursor: default;
      transition: 0.2s;
      text-transform: uppercase;
      letter-spacing: 4px;
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      font-family: 'Courier New', monospace;
      backdrop-filter: blur(6px);
      text-shadow: 0 0 8px cyan;
    }

    .btn-md3:hover {
      background: rgba(0, 80, 60, 0.9);
      box-shadow: 0 0 60px #ff00b3, 0 0 0 4px #ff44aa inset;
      border-color: #ff44aa;
      color: #fff;
      transform: scale(1.05) skew(-2deg);
    }

    /* Shadcn 线框按钮 进化成数据流按钮 */
    .btn-shadcn {
      background: rgba(0, 0, 0, 0.5);
      border: 2px dashed #00ff99;
      padding: 1rem 2.3rem;
      border-radius: 18px;
      font-size: 1.2rem;
      font-weight: 700;
      color: #99ffdd;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 25px cyan, inset 0 0 10px #00ffc3;
      cursor: default;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      font-family: 'Courier New', monospace;
    }

    .btn-shadcn:hover {
      background: rgba(255, 0, 150, 0.4);
      border-color: #ff00aa;
      color: #ffffff;
      box-shadow: 0 0 50px magenta;
      border-style: solid;
    }

    /* 黑客风格小标签：显示IP和WAF，带闪烁 */
    .badge {
      background: rgba(0, 50, 30, 0.6);
      backdrop-filter: blur(16px);
      padding: 0.5rem 1.5rem;
      border-radius: 40px;
      color: #00ffb3;
      font-weight: 700;
      font-size: 1rem;
      border: 1px solid #66ffcc;
      box-shadow: 0 0 15px #00ffc3, inset 0 0 8px #00ff80;
      width: fit-content;
      font-family: 'Courier New', monospace;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; box-shadow: 0 0 30px red; color: #ff88ff; }
    }

    /* 底部信息 —— 只留 Cloudflare + 土味黑客宣言，无小字 */
    .footer-note {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2.2rem;
      padding-top: 1.2rem;
      border-top: 3px solid #00ff99;
      font-size: 1rem;
      color: #88ffaa;
      text-shadow: 0 0 5px #00ffc3;
      font-family: 'Courier New', monospace;
    }

    .footer-note small {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: rgba(0, 30, 0, 0.7);
      padding: 0.3rem 1.2rem;
      border-radius: 60px;
      border: 1px solid #00ffaa;
      box-shadow: 0 0 10px lime;
    }

    /* 响应式调整 */
    @media (max-width: 480px) {
      .card { padding: 1.8rem 1.2rem; }
      .button-group { flex-direction: column; }
      .sub-title { font-size: 1.3rem; }
    }

    /* 土味黑客装饰：扫描线加强 & 流动代码光效 */
    .scanner-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 8px;
      background: linear-gradient(90deg, transparent, #00ffc3, #ff00aa, transparent);
      filter: blur(6px);
      animation: scan 6s linear infinite;
      z-index: 25;
      pointer-events: none;
      opacity: 0.5;
    }

    @keyframes scan {
      0% { top: -10px; }
      20% { top: 20%; }
      40% { top: 40%; }
      60% { top: 60%; }
      80% { top: 80%; }
      100% { top: 110%; }
    }

    /* 额外故障小字，代替之前的小字，更土 */
    .hacker-quote {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 1.1rem;
      color: #ff66cc;
      text-shadow: 0 0 10px magenta, 0 0 30px cyan;
      font-weight: 700;
      letter-spacing: 3px;
      animation: glitch-text 2.5s infinite;
      background: rgba(0,0,0,0.3);
      padding: 0.3rem;
      border-radius: 30px;
      font-family: 'Courier New', monospace;
    }

    @keyframes glitch-text {
      0%, 100% { transform: skew(0deg); opacity: 1; }
      95% { transform: skew(10deg); opacity: 0.8; color: #00ffaa; }
      96% { transform: skew(-10deg); color: #ff44cc; }
    }
  </style>
</head>
<body>
  <!-- 矩阵代码雨 canvas -->
  <canvas id="matrix-canvas"></canvas>
  <!-- 流动扫描线 (黑客特效) -->
  <div class="scanner-line"></div>

  <div class="card">
    <!-- 土味故障 403 -->
    <div class="glitch-wrapper">
      <h1>403</h1>
    </div>

    <!-- 赛博警告 sub -->
    <div class="sub-title">
      <span>💀⚡</span>
      <span>入侵检测 · 非中国IP阻断</span>
      <span>⚡💀</span>
    </div>

    <!-- 拦截信息，保留原意 + 黑客口吻 -->
    <div class="message">
      <p>
        <strong>⚠️ 根源分析：反代服务 · IP境外 ⚠️</strong><br/>
        <span style="font-size:1.5rem; color:#ff66aa;">> 你的IP不在中国大陆境内 &lt;</span><br/>
        <span style="display:block; margin-top:15px; background:#002800; padding:6px 12px; border-left:6px solid #00ffc3;">
        💢 防火墙规则: 仅允许境内直连  💢<br/>
        ⚡ 请使用境内IP访问原始服务 ⚡
        </span>
      </p>
    </div>

    <!-- 按钮组 (黑客帝国样式) -->
    <div class="button-group">
      <button class="btn-md3" onclick="void(0)">
        <span>⌨️</span> 立即直连(破解) <span>💻</span>
      </button>
      <button class="btn-shadcn" onclick="void(0)">
        <span>🔄</span> 重新扫描IP <span>🌐</span>
      </button>
    </div>

    <!-- 黑客小标签：IP / WAF 信息 -->
    <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-bottom: 0.5rem;">
      <div class="badge">
        <span>🛡️ 你的IP: 境外 · 已拦截 (CODE: 403)</span>
      </div>
      <div class="badge" style="background: rgba(50,0,30,0.6); border-color: #ff44cc;">
        <span>⚡ 反代守卫 · 黑客土味版</span>
      </div>
    </div>

    <!-- 底部 —— 只保留 Cloudflare + 一句赛博口号，无多余小字 -->
    <div class="footer-note">
      <small>
        <span>🛡️</span> Cloudflare WAF 深度防御
      </small>
      <small style="border-color: #ff44cc; box-shadow:0 0 15px magenta;">
        <span>⚡</span> # 土味黑客混搭 # Shadcn+MD3+Liquid+Fluent <span>⚡</span>
      </small>
    </div>

    <!-- 极简故障口号，代替之前一堆小字，更土更黑客 -->
    <div class="hacker-quote">
      > ACCESS DENIED - 你的IP已被记录 - SYSTEM HACKED? ❌
    </div>

    <!-- 隐蔽的额外光效 (终端光标) -->
    <div style="width:100%; text-align:right; margin-top:0.8rem; font-size:1.5rem; opacity:0.5; color:#00ff80;">_</div>
  </div>

  <script>
    (function() {
      // 矩阵代码雨 —— 土味黑客必备
      const canvas = document.getElementById('matrix-canvas');
      const ctx = canvas.getContext('2d');

      let width, height;
      let columns, drops = [];
      const fontSize = 18; // 字体大小

      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        columns = Math.floor(width / fontSize);
        drops = [];
        for (let i = 0; i < columns; i++) {
          drops[i] = Math.floor(Math.random() * -height); // 随机起始位置
        }
      }

      // 字符集：增加一些土味符号和数字
      const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz!@#$%^&*()_+{}[]:;<>,.?/~`你我他火水电土黑客";

      function draw() {
        // 半透明黑色矩形制造拖尾效果
        ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = '#00ffc3'; // 亮绿色
        ctx.font = fontSize + 'px "Courier New", monospace';
        ctx.shadowColor = '#00ffc3';
        ctx.shadowBlur = 8;

        for (let i = 0; i < drops.length; i++) {
          // 随机取一个字符
          const text = chars[Math.floor(Math.random() * chars.length)];
          const x = i * fontSize;
          const y = drops[i] * fontSize;

          // 随机颜色变化，增加土味
          if (Math.random() > 0.98) {
            ctx.fillStyle = '#ff44cc'; // 偶尔粉色
          } else {
            ctx.fillStyle = '#00ffc3';
          }

          ctx.fillText(text, x, y);

          // 重置或下落
          if (y > height && Math.random() > 0.99) {
            drops[i] = 0;
          } else {
            drops[i] += 0.8; // 下落速度
          }
        }
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', () => {
        resizeCanvas();
      });

      resizeCanvas();
      draw();

      // 额外增加随机glitch干扰（在卡片上产生移位效果）
      setInterval(() => {
        const card = document.querySelector('.card');
        if (Math.random() > 0.7) {
          card.style.transform = `translateX(${Math.random()*6 - 3}px) translateY(${Math.random()*4 - 2}px) skew(${Math.random()*2 -1}deg)`;
          setTimeout(() => {
            card.style.transform = '';
          }, 80);
        }
      }, 3000);
    })();
  </script>
</body>
</html>
