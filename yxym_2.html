<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>403 Forbidden - Windows Security Gateway</title>
<style>
    :root {
        --win-gray: #c0c0c0;
        --win-white: #ffffff;
        --win-dark: #000000;
        --win-shadow: #808080;
        --win-blue-grad: linear-gradient(90deg, #000080 0%, #0849ca 100%);
    }

    body {
        background-color: #008080;
        margin: 0;
        height: 100vh;
        font-family: "Tahoma", "MS Sans Serif", sans-serif;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    /* --- 窗口样式 --- */
    .win-window {
        background: var(--win-gray);
        width: 500px;
        border-top: 2px solid var(--win-white);
        border-left: 2px solid var(--win-white);
        border-right: 2px solid var(--win-dark);
        border-bottom: 2px solid var(--win-dark);
        box-shadow: 1px 1px 0px var(--win-shadow) inset;
        padding: 2px;
        position: absolute;
        top: 15%;
        left: calc(50% - 250px);
        z-index: 10;
    }

    .title-bar {
        background: var(--win-blue-grad);
        height: 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 2px 3px;
        cursor: default;
    }

    .title-text {
        color: var(--win-white);
        font-weight: bold;
        font-size: 11px;
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .win-btn-small {
        width: 16px; height: 14px; background: var(--win-gray);
        border-top: 1px solid var(--win-white); border-left: 1px solid var(--win-white);
        border-right: 1px solid var(--win-dark); border-bottom: 1px solid var(--win-dark);
        font-size: 9px; font-weight: bold; display: flex;
        align-items: center; justify-content: center; cursor: pointer;
    }

    .content-area { padding: 20px; display: flex; align-items: flex-start; }
    .message-box { font-size: 12px; color: var(--win-dark); line-height: 1.5; width: 100%; }
    
    .trace-view {
        background: var(--win-white); border-top: 2px solid var(--win-shadow); border-left: 2px solid var(--win-shadow);
        border-right: 2px solid var(--win-white); border-bottom: 2px solid var(--win-white);
        padding: 8px; font-family: "Consolas", monospace; font-size: 11px;
        height: 140px; overflow-y: scroll; margin-top: 12px; user-select: text;
    }

    /* --- 任务栏与开始菜单 --- */
    .taskbar {
        position: fixed; bottom: 0; left: 0; right: 0;
        height: 28px; background: var(--win-gray);
        border-top: 2px solid var(--win-white);
        display: flex; align-items: center; padding: 2px; z-index: 100;
    }

    .start-button {
        display: flex; align-items: center; gap: 4px;
        padding: 0 6px; height: 22px;
        border-top: 2px solid var(--win-white); border-left: 2px solid var(--win-white);
        border-right: 2px solid var(--win-dark); border-bottom: 2px solid var(--win-dark);
        font-weight: bold; font-size: 12px; cursor: pointer;
    }
    .start-button.active {
        border-top: 1px solid var(--win-dark); border-left: 1px solid var(--win-dark);
        border-right: 1px solid var(--win-white); border-bottom: 1px solid var(--win-white);
        background: #e0e0e0; padding: 1px 5px 0 7px;
    }

    /* 开始菜单弹出层 */
    .start-menu {
        position: fixed; bottom: 30px; left: 2px;
        width: 180px; background: var(--win-gray);
        border-top: 2px solid var(--win-white); border-left: 2px solid var(--win-white);
        border-right: 2px solid var(--win-dark); border-bottom: 2px solid var(--win-dark);
        display: none; flex-direction: column; box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    }
    .start-menu-sidebar {
        width: 25px; background: linear-gradient(180deg, #808080, #000080);
        position: absolute; left: 0; top: 0; bottom: 0;
        writing-mode: vertical-lr; transform: rotate(180deg);
        color: white; font-weight: bold; padding: 10px 5px; font-size: 14px;
    }
    .menu-items { margin-left: 25px; padding: 2px; }
    .menu-item {
        padding: 6px 10px; display: flex; align-items: center; gap: 8px;
        font-size: 12px; cursor: default;
    }
    .menu-item:hover { background: #000080; color: white; }
    .menu-sep { border-top: 1px solid var(--win-shadow); border-bottom: 1px solid var(--win-white); margin: 2px 0; }

    /* 状态栏托盘 */
    .system-tray {
        margin-left: auto; height: 20px; padding: 0 8px;
        border-top: 1px solid var(--win-shadow); border-left: 1px solid var(--win-shadow);
        border-right: 1px solid var(--win-white); border-bottom: 1px solid var(--win-white);
        display: flex; align-items: center; font-size: 11px; gap: 5px;
    }

    .btn-row { display: flex; justify-content: flex-end; gap: 8px; padding: 10px 20px 15px 0; }
    .win-btn {
        min-width: 75px; height: 23px; background: var(--win-gray);
        border-top: 1px solid var(--win-white); border-left: 1px solid var(--win-white);
        border-right: 1px solid var(--win-dark); border-bottom: 1px solid var(--win-dark);
        outline: 1px solid var(--win-dark); font-size: 12px; cursor: pointer;
    }
</style>
</head>
<body>

<div class="start-menu" id="startMenu">
    <div class="start-menu-sidebar">Windows Me</div>
    <div class="menu-items">
        <div class="menu-item"><span>🚀</span> 运行...</div>
        <div class="menu-item"><span>🔍</span> 查找</div>
        <div class="menu-item"><span>⚙️</span> 设置</div>
        <div class="menu-item"><span>📁</span> 文档</div>
        <div class="menu-sep"></div>
        <div class="menu-item" onclick="location.reload()"><span>🔄</span> 重新启动</div>
        <div class="menu-item" onclick="window.close()"><span>🚪</span> 注销系统</div>
    </div>
</div>

<div class="win-window" id="dragWindow">
    <div class="title-bar" id="dragHeader">
        <div class="title-text">
            <img src="https://win98icons.alexmeub.com/icons/png/msie2-2.png" width="14" height="14">
            Security Alert - 403 Forbidden
        </div>
        <div class="title-controls">
            <div class="win-btn-small">?</div>
            <div class="win-btn-small" onclick="location.reload()">×</div>
        </div>
    </div>

    <div class="content-area">
        <div class="message-box">
            <div style="display:flex; align-items:center; margin-bottom:15px; gap:15px;">
                <img src="https://win98icons.alexmeub.com/icons/png/msg_error-2.png" width="32" height="32">
                <strong>访问被拒绝：权限限制</strong>
            </div>
            <p>由于 Web 应用防火墙策略限制，您的访问请求已被拦截。此资源仅针对中国大陆境内的 IP 地址开放。</p>
            
            <div class="trace-view" id="trace-output">正在抓取系统网络跟踪数据...</div>
        </div>
    </div>

    <div class="btn-row">
        <button class="win-btn" onclick="location.reload()">重试</button>
        <button class="win-btn" onclick="alert('请联系系统管理员。')">取消</button>
    </div>
</div>

<div class="taskbar">
    <div class="start-button" id="startBtn">
        <img src="https://win98icons.alexmeub.com/icons/png/windows-0.png" width="16" height="16">
        <span>开始</span>
    </div>
    <div style="width: 160px; height: 22px; background: #e0e0e0; border: 1px solid var(--win-shadow); font-size: 11px; display: flex; align-items: center; padding-left: 5px; box-shadow: 1px 1px 0 #fff;">
        <img src="https://win98icons.alexmeub.com/icons/png/msie2-2.png" width="14" height="14" style="margin-right:5px;">
        Security Alert...
    </div>
    <div class="system-tray">
        <img src="https://win98icons.alexmeub.com/icons/png/network_normal_two_computers-0.png" width="14" height="14">
        <span id="clock">00:00</span>
    </div>
</div>

<script>
    // 1. 获取 Cloudflare Trace 原始数据
    fetch('https://cloudflare.com/cdn-cgi/trace')
        .then(r => r.text())
        .then(data => { document.getElementById('trace-output').textContent = data; })
        .catch(() => { document.getElementById('trace-output').textContent = "Trace failed: 无法连接至远程认证网关。"; });

    // 2. 窗口拖拽
    const win = document.getElementById("dragWindow"), header = document.getElementById("dragHeader");
    let isDrag = false, ox, oy;
    header.onmousedown = (e) => { isDrag = true; ox = e.clientX - win.offsetLeft; oy = e.clientY - win.offsetTop; };
    document.onmousemove = (e) => { if (isDrag) { win.style.left = (e.clientX - ox) + "px"; win.style.top = (e.clientY - oy) + "px"; } };
    document.onmouseup = () => isDrag = false;

    // 3. 开始菜单控制
    const startBtn = document.getElementById('startBtn'), startMenu = document.getElementById('startMenu');
    startBtn.onclick = (e) => {
        e.stopPropagation();
        const isOpen = startMenu.style.display === 'flex';
        startMenu.style.display = isOpen ? 'none' : 'flex';
        startBtn.classList.toggle('active');
    };
    document.onclick = () => { 
        startMenu.style.display = 'none'; 
        startBtn.classList.remove('active'); 
    };

    // 4. 时钟
    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').textContent = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
    }, 1000);
</script>

</body>
</html>
