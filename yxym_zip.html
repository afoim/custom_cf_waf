<!DOCTYPE html><html><head><meta charset=utf-8><title>403</title><style>
body{background:#00A;color:#AAA;font:14px monospace;margin:0;display:flex;align-items:center;justify-content:center;height:100vh;text-transform:uppercase}
.shell{border:3px solid #FFF;padding:30px;width:85%;max-width:650px;box-shadow:15px 15px 0 #000}
.status{background:#FFF;color:#00A;padding:2px 10px;font-weight:bold;margin-bottom:20px;display:inline-block}
h1{color:#FFF;margin:0 0 10px}
.msg{color:#FF5;margin-bottom:20px;border-left:4px solid #FF5;padding-left:10px}
.trace{background:#000;color:#0F0;padding:10px;border:1px solid #FFF;font-size:13px}
.line{display:flex;justify-content:space-between;border-bottom:1px solid #222}
.key{color:#0A0}.foot{margin-top:10px;font-size:12px;color:#FFF;opacity:.7}
</style></head><body>
<div class=shell>
<div class=status>MOD_SECURITY_WAF</div>
<h1>403:ACCESS_DENIED</h1>
<div class=msg>GEO_RESTRICTION:OUTSIDE CN<br>BLOCKED BY EDGE</div>
<div class=trace id=o>[TRACE...]</div>
<div class=foot>DISABLE VPN OR USE CN NETWORK</div>
</div>
<script>
(async()=>{
let o=document.getElementById('o');
try{
let t=await(await fetch('/cdn-cgi/trace')).text(),ip='UNK',loc='UNK';
o.innerHTML='<div>[TRACE]</div>';
t.trim().split('\n').forEach(l=>{
let[k,v]=l.split('=');
if(k=='ip')ip=v;
if(k=='loc')loc=v;
});
o.innerHTML+=`
<div class=line><span class=key>IP</span><span>${ip}</span></div>
<div class=line><span class=key>LOC</span><span>${loc}</span></div>
<div class=line><span class=key>TIME</span><span>${new Date().toISOString()}</span></div>`
}catch{o.innerHTML='<span style=color:red>ERROR</span>'}
})();
</script></body></html>
