<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>403 Forbidden</title>
<style>
body{
    margin:0;
    background:#2b2b2b; /* 主背景：深灰 */
    color:#e6e6e6;
    font-family:MS PGothic,monospace
}
.wrap{
    max-width:760px;
    margin:40px auto;
    padding:0 12px
}
.box{
    border:2px solid #555; /* 边框更柔 */
    padding:12px;
    margin-bottom:12px;
    background:#3a3a3a; /* 卡片灰 */
    box-shadow:0 0 8px rgba(0,0,0,0.4)
}
h1{
    font-size:22px;
    margin:0 0 8px;
    color:#ffffff
}
small{
    color:#b0b0b0
}
pre{
    white-space:pre-wrap;
    font-size:13px;
    line-height:1.5;
    color:#dddddd
}
.tag{
    display:inline-block;
    border:1px solid #777;
    padding:2px 6px;
    margin-right:6px;
    background:#4a4a4a
}
.warn{
    color:#ff6b6b; /* 红色稍微柔一点 */
    font-weight:bold
}
</style>
</head>
<body>
<div class="wrap">

<div class="box">
<h1>403 Forbidden</h1>
<div><span class="tag">ERROR</span><span class="warn">アクセス拒否</span></div>
<p>このサイトは中国本土IPのみ許可されています。</p>
<small>※ プロキシ / VPN 使用時はブロックされる場合があります</small>
</div>

<div class="box">
<b>[Cloudflare Trace]</b>
<pre id="trace">loading...</pre>
</div>

<div class="box">
<b>[Hint]</b>
<pre>
・海外IPは拒否されます
・VPN/Proxyを無効化してください
・しばらく待って再試行してください
</pre>
</div>

<div class="box">
<b>[Credits]</b>
<pre>
このHTMLページは RATING3PRO によって提供されました。
ご協力に感謝いたします。
</pre>
</div>

</div>

<script>
fetch("/cdn-cgi/trace").then(r=>r.text()).then(t=>{
document.getElementById("trace").textContent=t;
}).catch(()=>{
document.getElementById("trace").textContent="trace取得失敗";
});
</script>
</body>
</html>
